name: PR Load Test

permissions:
  contents: read

# Trigger the test Manually additionally provide PR number.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request Number without "PR-" prefix'
        required: true
      image:
        type: choice
        options:
          - otel-collector
          - fluent-bit
          - prometheus
          - logs-otel
        description: "Image to test"
        required: true
      duration:
        type: string
        description: "Duration of the test in seconds"
        required: true
        default: "1200"
      selfmonitor_pr_image:
        type: boolean
        description: "Use self-monitor image built from the PR"
        default: false

run-name: "Load Test for ${{ inputs.image }} on PR-${{ inputs.pr_number }}"

env:
  MANAGER_IMAGE: europe-docker.pkg.dev/kyma-project/dev/telemetry-manager:PR-${{ github.event.inputs.pr_number }}

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "refs/pull/${{ github.event.inputs.pr_number }}/head"
          repository: ${{ github.repository }}
          persist-credentials: false
      - id: set-matrix
        run: |
          image=${GITHUB_EVENT_INPUTS_IMAGE}
          matrix=$(jq --arg image "$image" 'map( . | select (.image==$image) )' hack/load-tests/matrix_includes.json)
          echo "matrix={\"include\":$(echo $matrix)}" >> $GITHUB_OUTPUT
        env:
          GITHUB_EVENT_INPUTS_IMAGE: ${{ github.event.inputs.image }}

  load-test:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest

    steps:
      - name: Test matrix configuration
        run: echo "input = ${GITHUB_EVENT_INPUTS_IMAGE}, matrix = ${MATRIX_IMAGE}"
        env:
          GITHUB_EVENT_INPUTS_IMAGE: ${{ github.event.inputs.image }}
          MATRIX_IMAGE: ${{ matrix.image }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "refs/pull/${{ github.event.inputs.pr_number }}/head"
          repository: ${{ github.repository }}
          persist-credentials: false

      - name: Setup Golang
        uses: "./.github/template/setup-golang"

      - name: Setup gardener cluster name
        run: |
          ID=$(echo ${{ github.run_id }}${{ github.run_attempt }} | rev )
          SHORT_NAME=$(echo ${MATRIX_NAME} | awk -F- '{for(i=1;i<=NF;i++) printf "%s",substr($i,1,1);print "";}')
          GARDENER_CLUSTER_NAME=$(echo lt-${SHORT_NAME}-${ID} | cut -c 1-14)
          echo "GARDENER_CLUSTER_NAME=$GARDENER_CLUSTER_NAME" >> $GITHUB_ENV
        env:
          MATRIX_NAME: ${{ matrix.name }}

      - name: Save service account to file
        shell: bash
        run: 'echo "$GARDENER_SA" > /tmp/gardener-sa.yaml'
        env:
          GARDENER_SA: ${{ secrets.GARDENER_SA }}

      - name: Provision gardener cluster
        run: make provision-gardener
        env:
          GARDENER_SECRET_NAME: ${{ secrets.GARDENER_SECRET_NAME }}
          GARDENER_PROJECT: ${{ secrets.GARDENER_PROJECT }}
          GARDENER_SA_PATH: /tmp/gardener-sa.yaml
          GARDENER_MIN_NODES: 2
          GARDENER_MAX_NODES: 2

      - name: Deploy telemetry
        run: |
          if [ "${GITHUB_EVENT_INPUTS_SELFMONITOR_PR_IMAGE}" = "true" ]; then
            export SELF_MONITOR_IMAGE="europe-docker.pkg.dev/kyma-project/dev/tpi/telemetry-self-monitor:PR-${GITHUB_EVENT_INPUTS_PR_NUMBER}"
          fi
          hack/deploy-telemetry.sh
        env:
          GITHUB_EVENT_INPUTS_SELFMONITOR_PR_IMAGE: ${{ github.event.inputs.selfmonitor_pr_image }}
          GITHUB_EVENT_INPUTS_PR_NUMBER: ${{ github.event.inputs.pr_number }}

      - name: Deploy Istio module
        run: hack/deploy-istio.sh

      - name: Run load test
        run: hack/load-tests/run-load-test.sh -n ${MATRIX_NAME} -t ${MATRIX_TYPE} -m ${MATRIX_MULTI} -b ${MATRIX_BACKPRESSURE} -d ${GITHUB_EVENT_INPUTS_DURATION} -o "${MATRIX_OVERLAY}"
        env:
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_TYPE: ${{ matrix.type }}
          MATRIX_MULTI: ${{ matrix.multi }}
          MATRIX_BACKPRESSURE: ${{ matrix.backpressure }}
          GITHUB_EVENT_INPUTS_DURATION: ${{ github.event.inputs.duration }}
          MATRIX_OVERLAY: ${{ matrix.overlay }}

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: Results-${{ matrix.name }}
          path: tests/*.json

      - name: Deprovision gardener cluster
        run: make deprovision-gardener
        # always run the deprovision step, even if the previous steps failed
        if: always()
        env:
          GARDENER_SA_PATH: /tmp/gardener-sa.yaml

  print-results:
    needs: load-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "refs/pull/${{ github.event.inputs.pr_number }}/head"
          repository: ${{ github.repository }}
          persist-credentials: false
      - name: Download results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: perf-results
          merge-multiple: true
      - name: Print results
        run: |
          ls -la perf-results
          python3 hack/load-tests/convert-results.py perf-results
      - name: Send results to GitHub summary
        run: python3 hack/load-tests/convert-results.py -m perf-results >> $GITHUB_STEP_SUMMARY
